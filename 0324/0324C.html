    <h1>홍차</h1>
    <hr>
    <h2>정의</h2>
    <P>홍차(紅茶)는 백차, 녹차, 우롱차보다 더 많이 산화된 차(Camellia Sinensis)의 일종이다. 
        따라서 향이 더 강하며, 카페인을 더 많이 함유한다고 알려져 있지만 이는 흔한 오해이다.</P>
    <br>
    <h2>등급</h2>
    <p>홍차는 채엽 부위 혹은 찻잎의 크기에 따라 등급을 분류하는 것이 일반적이다. 
       보통 제일 위 어린 싹을 FOP(Flowery Orange Pekoe), 그 다음을 OP(Orange Pekoe), 
       P(Pekoe), PS(Pekoe Souchon), S(Souchon)로 분류한다.
    </p>
    <h3>채엽 위치에 따른 등급 (고급 순)</h3>
