<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h3>순서가 없는 목록</h3>
    <ul type="disc"> <!--disc(default) | circle | square--> 
        <li>수박</li>
        <li>석류</li>
        <li>코코넛</li>
    </ul>

    <h3>순서가 있는 목록</h3>
    <ol type="A"> <!-- 1(default) | A | a | I | i -->
        <li>수박</li>
        <li>석류</li>
        <li>코코넛</li>
    </ol>
</body>
</html>
