<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rain World Wiki - 메인</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif; }
        body {
            background-color: #050508; color: #ffffff; display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 30px;
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.8)), url('imgs/back.png');
            background-size: cover; background-position: center; background-attachment: fixed;
        }

        .wiki-outer-container {
            border: 1.5px solid rgba(255, 255, 255, 0.15); background-color: rgba(0, 0, 0, 0.55);
            width: 100%; max-width: 1480px; padding: 55px; box-shadow: 0 0 40px rgba(0, 0, 0, 0.75);
            display: flex; flex-direction: column; gap: 40px;
        }

        .main-title {
            font-size: 4.5rem; font-weight: bold; color: #ffffff; text-decoration: none; text-align: center;
            text-shadow: -1.5px -1.5px 0 #ff0055, 1.5px -1.5px 0 #ff0055, -1.5px 1.5px 0 #ff0055, 1.5px 1.5px 0 #ff0055, 0 0 15px #aa00ff, 0 0 30px #ff0055;
            letter-spacing: 2px; padding-bottom: 20px; margin-bottom: 10px;
        }

        .wiki-box { 
            border: 1.5px solid rgba(255, 255, 255, 0.25); padding: 35px; 
            background-color: rgba(0, 0, 0, 0.4); text-align: center;
        }
        
        .welcome-title { font-size: 2.2rem; font-weight: normal; margin-bottom: 15px; color: #ffffff; }
        .welcome-desc { font-size: 1.3rem; line-height: 1.8; color: #e0e0e0; max-width: 900px; margin: 0 auto; word-break: keep-all; }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
            margin-top: 20px;
        }

        .menu-item {
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            background-color: rgba(0, 0, 0, 0.5);
            padding: 40px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            cursor: pointer;
            text-decoration: none;
            position: relative;
            top: 0px; 
        }

        .menu-label {
            font-size: 1.8rem; color: #ffffff; font-weight: bold; letter-spacing: 1px;
        }

        .menu-img {
            width: 140px; height: 140px; object-fit: contain;
        }

        .footer-info {
            margin-top: 20px; border-top: 1px solid rgba(255, 255, 255, 0.15); 
            padding-top: 30px; display: flex; justify-content: space-between; font-size: 1.1rem; color: #888888;
        }
    </style>

    <script>
        $(document).ready(function() {
            const speed = 300; 

            $('.menu-item').mouseenter(function() {
                $(this).stop().animate({
                    top: "-8px",
                    backgroundColor: "rgba(15, 5, 10, 0.6)",
                    borderTopColor: "#ff0055", borderBottomColor: "#ff0055",
                    borderLeftColor: "#ff0055", borderRightColor: "#ff0055"
                }, speed).css('box-shadow', '0 0 25px rgba(255, 0, 85, 0.5), inset 0 0 15px rgba(255, 0, 85, 0.2)');
                
                $(this).find('.menu-label').stop().animate({ color: "#ff0055" }, speed)
                    .css('text-shadow', '0 0 10px rgba(255, 0, 85, 0.6)');

                $(this).find('.menu-img').stop().animate({ width: "154px", height: "154px" }, speed);
            });

            $('.menu-item').mouseleave(function() {
                $(this).stop().animate({
                    top: "0px",
                    backgroundColor: "rgba(0, 0, 0, 0.5)",
                    borderTopColor: "rgba(255, 255, 255, 0.2)", borderBottomColor: "rgba(255, 255, 255, 0.2)",
                    borderLeftColor: "rgba(255, 255, 255, 0.2)", borderRightColor: "rgba(255, 255, 255, 0.2)"
                }, speed).css('box-shadow', 'none');
                
                $(this).find('.menu-label').stop().animate({ color: "#ffffff" }, speed)
                    .css('text-shadow', 'none');

                $(this).find('.menu-img').stop().animate({ width: "140px", height: "140px" }, speed);
            });
        });
    </script>
</head>
<body>

    <div class="wiki-outer-container">
        <h1 class="main-title">Rain World Wiki</h1>

        <div class="wiki-box">
            <h2 class="welcome-title">레인 월드 위키에 오신 것을 환영합니다</h2>
            <p class="welcome-desc">
                이곳은 인디 서바이벌 플랫폼 게임 <strong>Rain World(레인 월드)</strong>의 생명체, 아이템, 음식 및 통행권 업적 정보를 다루는 한국어 위키 공간입니다.
            </p>
        </div>

        <div class="menu-grid">
            <a href="wiki2.html" class="menu-item">
                <div class="menu-label">생명체</div>
                <img src="imgs/Creatures_gallery_icon.png" alt="생명체" class="menu-img">
            </a>
            <a href="item.html" class="menu-item">
                <div class="menu-label">아이템</div>
                <img src="imgs/Objects_gallery_icon.png" alt="아이템" class="menu-img">
            </a>
            <a href="food.html" class="menu-item">
                <div class="menu-label">음식</div>
                <img src="imgs/Food_gallery_icon.png" alt="음식" class="menu-img">
            </a>
            <a href="up.html" class="menu-item">
                <div class="menu-label">업적</div>
                <img src="imgs/Achievements_gallery_icon.png" alt="업적" class="menu-img">
            </a>
        </div>

        <footer class="footer-info">
            <div>Rain World는 Videocult에서 개발하고 Akupara Games에서 유통하는 게임입니다.</div>
        </footer>
    </div>

</body>
</html>
