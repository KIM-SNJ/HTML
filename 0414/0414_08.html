<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .div1 {
            width: 400px;
            height: 400px;
            background-color: rgb(22,133,118);
            color: white;
            border: 10px double rgb(56,56,99);
            margin: 50px 50px 0 50px;
            padding-right: 0 50px 0 50px;
            text-align: center;
            line-height:300px;
        }
        .div2 {
            width: 400px;
            height: 400px;
            background-color: rgb(31, 33, 199);
            color: white;
            border: 20px inset rgb(122, 7, 88);
            margin: 50px 50px 0 50px;
            padding-right: 0 50px 0 50px;
            text-align: center;
            line-height:300px;
        }
        .div3 {
            width: 300px;
            height: 300px;
            background-color: rgb(53, 219, 67);
            color: white;
            border-width: 30px;
            border-style: outset;
            border-color: rgb(10, 27, 255);
            margin-right: 50px;
            margin-left: 50px;
            padding-right: 50px;
            padding-left: 50px;
            text-align: center;
            line-height:300px;
        }
    </style>
</head>
<body>
    <div class="div1">박스 속성과 값을 설정 방법</div>
    <div class="div2">박스 속성과 값을 설정 방법</div>
    <div class="div3">박스 속성과 값을 설정 방법</div>
</body>
</html>
