<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM(Document Object Model)</title>
    <script>
        window.onload = function() {
            let firstH1 = document.getElementById("firsth1");
            firstH1.style.color= "orange";
            firstH1.style.backgroundColor = "red";
            firstH1.innerHTML = "첫 번째 h1 요소입니다."
        }
        function background() {
            document.body.style.backgroundColor = "black";
            document.body.style.color = "white";
            document.getElementById("firsth1").style.color = "white";
            document.getElementById("firsth1").style.backgroundColor = "rgb(0,255,255)";
            document.getElementById("button").style.backgroundColor = "darkgray";
            document.getElementById("button").style.color = "lightgray";
        }
    </script>
</head>
<body id = "background">
    <button onclick="background()">다크모드</button>
    <h1 id = "firsth1">DOM(Document Object Model)</h1>
    <h1>: 요소객체가 로드된 이후에 요소객체의 CSS 스타일을 변경할 수 있습니다.</h1>
</body>
</html>
