<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function add(num1, num2) {
            let sum = num1 + num2;
            alert(num1 + " + " + num2 + " = " + sum);
        }

        function hello(message) {
            alert("오늘의 인사말: " + message);
        }

        add(100, 200);
        hello("오늘은 정말 행복한 날이에요.")
        add(5, 7);
        hello("Great Day!");
    </script>
</head>
<body>
    
</body>
</html>
