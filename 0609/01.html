<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인라인 이벤트 모델 1</title>
    <script>
        window.onload = function() {
            let a1 = document.getElementById("a1");
            a1.onclick = function() {
                return false;
            }
        }
        function greet() {
            alert('안녕하세요~ 인라인 이벤트 모델 2');
        }

        function addStar(btn) {
            btn.textContent += '★';
        }
        
        function overChange(btn) {
            btn.style.backgroundColor = "magenta";
            btn.style.color = "white";
        }

        function outChange(btn) {
            btn.style.backgroundColor = "lightgray";
            btn.style.color = "black";
        }
        let count = 1;
        function changeImg(img) {
            count += 1;
            img.src = "picture/dog" + count + ".jpg";
            if (count == 5) {
                count = 0;
            }
        }
        
        setInterval(function() {
            let img2 = document.getElementById("img2");
            count += 1;
            img2.src = "picture/dog" + count + ".jpg";
            if (count == 5) {
                    count = 0;
            }
        }, 1000)
    </script>
</head>
<body>
    <button onclick = "alert('인라인 이벤트 모델1')">인라인 이벤트 모델 1</button><br><br>
    <button onclick = "greet()">인라인 이벤트 모델 2</button><br><br>
    <button onclick = "addStar(this)">별 추가</button><br><br>
    <button onmouseover = "overChange(this)" onmouseout = "outChange(this)">배경 및 글자색 변경</button> <br><br>
    <img src="picture/dog1.jpg" width="400" height="300" onclick = "changeImg(this)"><br><br>
    <img src="picture/dog1.jpg" width="400" height="300" id = "img2"><br><br>
    <a href="https://www.naver.com/" id = "a1">디폴트 이벤트 제거</a>
</body>
</html>
